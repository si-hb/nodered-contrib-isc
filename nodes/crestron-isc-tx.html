<script type="text/javascript">
    RED.nodes.registerType("crestron-isc-tx", {
        category: "network",
        color: "#E58A7E",
        defaults: {
            name: { value: "" },
            totalAnalogSignals: {
                value: 0,
                required: true,
                validate: function (v) {
                    const n = Number(v);
                    return Number.isFinite(n) && n >= 0 && n <= 1024;
                }
            }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-sign-out",
        paletteLabel: "Crestron ISC TX",
        label: function () {
            return this.name || "Crestron ISC TX";
        }
    });
</script>

<script type="text/html" data-template-name="crestron-isc-tx">
    <style>
        .crestron-isc-tx-edit .form-row label { width: 170px; }
        .crestron-isc-tx-edit .form-row input { width: calc(100% - 180px); }
    </style>
    <div class="crestron-isc-tx-edit">
        <div class="form-row">
            <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
            <input type="text" id="node-input-name">
        </div>

        <div class="form-row">
            <label for="node-input-totalAnalogSignals"><i class="fa fa-hashtag"></i> Total Analog Signals</label>
            <input type="number" id="node-input-totalAnalogSignals" min="0" max="1024">
        </div>
    </div>
</script>

<script type="text/html" data-help-name="crestron-isc-tx">
    <p>Encodes outgoing ISC messages into raw byte frames. Pure codec — no transport.
    Wire the output to whatever Node-RED node moves the bytes (serial port, RS232/RS485,
    MQTT, raw TCP, file write, etc.).</p>

    <p>For TCP-based ISC connections you almost always want the <b>Crestron ISC</b> node
    instead, which bundles encode + decode + TCP server/client into one.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd>One of <code>digital</code>, <code>analog</code>, or <code>serial</code>.</dd>

        <dt>channel <span class="property-type">number | array</span></dt>
        <dd>Signal channel number (1-indexed). May be an array to encode multiple signals
        in one message; pair with an array <code>payload</code> of equal length. The output
        will be a single Buffer with all frames concatenated.</dd>

        <dt>payload <span class="property-type">boolean | number | string | array</span></dt>
        <dd>The signal value:
            <ul>
                <li><code>digital</code>: boolean (or 0/1)</li>
                <li><code>analog</code>: integer 0..65535</li>
                <li><code>serial</code>: latin1 string (no <code>0xFF</code> bytes, non-empty)</li>
            </ul>
        </dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">Buffer</span></dt>
        <dd>The raw ISC byte frame(s). The original message is forwarded with only
        <code>payload</code> replaced.</dd>
    </dl>

    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Total Analog Signals</dt>
        <dd>The total count of analog + serial signals used on the ISC symbol in the Crestron
        program. The symbol must have identical quantities on both sides.</dd>
    </dl>
</script>
